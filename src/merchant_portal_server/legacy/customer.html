        // ===== 隐私模式 =====
        let _autoOrderMode = '';

        function renderPrivacyMode() {
            const grid = document.getElementById('devicesGrid');
            const esc = (v) => String(v == null ? '' : v).replace(/[<>&"']/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&#39;' }[c]));

            // 检查用户是否有运行中的订单
            const myRunning = _allDevices.find(d => d.running_user_id === CURRENT_USER_ID);
            if (myRunning) {
                grid.innerHTML = '<div class="privacy-mode-running-note">您有正在运行的订单，请先结束后再下单</div>';
                return;
            }

            // 判断有哪些模式的机器及可用状态
            const now = Date.now();
            const skipThreshold = (_privacySkipBalanceW > 0) ? _privacySkipBalanceW * 10000 : 0;
            function readHfbValue(d) {
                const raw = d.hfb_value ?? d.currency_balance ?? d.harvard ?? '';
                if (typeof raw === 'number') return raw;
                const text = String(raw).replace(/,/g, '').trim();
                if (!text) return 0;
                const m = text.match(/(-?\d+(?:\.\d+)?)\s*(万|w|W)?/);
                if (!m) return 0;
                const n = parseFloat(m[1]);
                if (!Number.isFinite(n)) return 0;
                return m[2] ? n * 10000 : n;
            }
            function modeStatus(targetMode) {
                const matched = _allDevices.filter(d => d.mode === targetMode || d.mode === 'hybrid');
                if (matched.length === 0) return { exists: false };
                const idleList = matched.filter(d => {
                    if (d.running_order_id) return false;
                    if (d.cooldown_until_ms && d.cooldown_until_ms > now) return false;
                    if (d.work_status !== '空闲') return false;
                    if (skipThreshold > 0) {
                        const hfbVal = readHfbValue(d);
                        if (hfbVal > 0 && hfbVal < skipThreshold) return false;
                    }
                    return true;
                });
                if (idleList.length > 0) return { exists: true, available: true, total: matched.length, idle: idleList.length };
                // 找最早结束时间
                let earliest = null;
                matched.forEach(d => {
                    if (d.end_time_ms && d.end_time_ms > now) {
                        if (!earliest || d.end_time_ms < earliest) earliest = d.end_time_ms;
                    }
                });
                return { exists: true, available: false, earliest, total: matched.length, idle: 0 };
            }

            const machineStatus = modeStatus('machine');
            const absoluteStatus = modeStatus('absolute');

            function remainText(ms) {
                if (!ms) return '';
                const remainMs = Math.max(0, ms - Date.now());
                const minutes = Math.max(1, Math.ceil(remainMs / 60000));
                const h = Math.floor(minutes / 60);
                const m = minutes % 60;
                if (h > 0 && m > 0) return `${h}小时${m}分钟`;
                if (h > 0) return `${h}小时`;
                return `${minutes}分钟`;
            }

            function renderBtn(mode, label, status) {
                if (!status.exists) return '';
                const available = !!status.available;
                let statusText = '较多';
                let loadClass = 'load-idle';
                let hint = '系统自动分配';
                let fullHint = '';
                if (!available) {
                    statusText = '暂满';
                    loadClass = 'load-none';
                    fullHint = status.earliest ? `距离最近下机还有 ${remainText(status.earliest)}` : '当前无空闲机器';
                    hint = fullHint;
                } else {
                    const total = status.total || 0;
                    const idle = status.idle || 0;
                    const idleRatio = total > 0 ? (idle / total) : 0;
                    if (idleRatio >= 0.5) {
                        statusText = '较多';
                        loadClass = 'load-idle';
                    } else {
                        statusText = '较少';
                        loadClass = 'load-scarce';
                    }
                }
                const fullClass = available ? '' : ' is-full';
                const icon = available ? '✓' : '✕';
                const subText = available
                    ? `<span class="privacy-mode-card-load ${loadClass}">${esc(statusText)}</span> · ${esc(hint)}`
                    : `<span class="privacy-mode-card-load ${loadClass}">${esc(statusText)}</span> · ${esc(hint)}`;
                return `
                    <button type="button" class="privacy-mode-card ${mode}${fullClass}" data-auto-mode="${esc(mode)}" data-available="${available ? '1' : '0'}" data-full-hint="${esc(fullHint || hint)}" aria-label="${esc(label)}">
                        <div class="privacy-mode-card-inner">
                            <div class="privacy-mode-card-title"><span class="privacy-mode-card-icon">${icon}</span>${esc(label)}</div>
                            <div class="privacy-mode-card-sub">${subText}</div>
                        </div>
                    </button>`;
            }

            let btns = '';
            btns += renderBtn('machine', '机密下单', machineStatus);
            btns += renderBtn('absolute', '绝密下单', absoluteStatus);

            if (!btns) {
                grid.innerHTML = '<div class="empty-state">暂无可用设备</div>';
                return;
            }

            grid.innerHTML = `<div class="privacy-mode-shell">${btns}</div>`;
            grid.querySelectorAll('.privacy-mode-card[data-auto-mode]').forEach((btn) => {
                btn.addEventListener('click', () => {
                    if (_maintenanceMode) {
                        appAlert(_maintenanceMessage || '平台维护中，暂停下单');
                        return;
                    }
                    if (btn.dataset.available !== '1') {
                        appAlert(btn.dataset.fullHint || '当前无空闲机器');
                        return;
                    }
                    openAutoOrderModal(btn.dataset.autoMode);
                });
            });
        }

        async function submitRecharge(inputId = 'rechargeCode') {
            const input = document.getElementById(inputId) || document.getElementById('rechargeCode');
            const code = input.value.trim();
            if (!code) return appAlert('请输入卡密');

            const btn = inputId === 'selfRechargeCode'
                ? document.getElementById('selfRechargeBtn')
                : document.getElementById('rechargeBtn');

        // ===== 订单列表 =====
        async function loadOrders() {
            const container = document.getElementById('ordersContainer');
            try {
                const res = await fetch('/api/orders/mine');
                const data = await res.json();

                if (!data.ok || !data.orders || data.orders.length === 0) {
                    container.innerHTML = '<div class="empty-state">暂无订单记录</div>';
                    return;
                }

                let html = `<table class="orders-table">
                    <thead><tr>
                        <th>ID</th><th>设备</th><th>组队码</th><th>模式</th>
                        <th>扣除</th><th>实际使用</th><th>退还</th>
                        <th>状态</th><th>下单时间</th><th class="order-action-th">操作</th>
                    </tr></thead><tbody>`;

                data.orders.forEach(o => {
                    const modeLabel = o.mode === 'machine' ? '机密' : (o.mode === 'hybrid' ? '混合' : '绝密');
                    let statusHtml = '';
                    if (o.status === 'running') statusHtml = '<span class="order-status order-running">运行中</span>';
                    else if (o.status === 'completed') statusHtml = '<span class="order-status order-completed">已完成</span>';
                    else statusHtml = '<span class="order-status order-failed">失败</span>';

                    let actionHtml = '';
                    if (o.status === 'running') {
                        // 防御：o.id 必须是有效整数，避免渲染出 onclick="openSwitchDeviceModal(null)"
                        // 这种最后导致 fetch /api/order/null/switch-device 404
                        const oid = parseInt(o.id);
                        const validId = Number.isFinite(oid) && oid > 0;
                        const stopBtn = (currentRole === 'night_card' || !validId) ? '' : `<button class="btn-sm btn-danger" onclick="stopOrder(${oid})">结束</button> `;
                        const switchBtn = (currentRole === 'night_card' && validId) ? `<button class="btn-sm btn-amber" onclick="openSwitchDeviceModal(${oid})">换机</button> ` : '';
                        const spectateBtn = validId ? `<button class="btn-sm btn-amber" onclick="switchSpectate(${oid})" style="margin-left:4px;">切换视角</button>` : '';
                        const rejoinBtn = validId ? `<button class="btn-sm btn-primary" onclick="rejoinOrder(${oid})">更换队伍</button>` : '';
                        // 备用电脑：仅在该订单的设备绑定了备用电脑、且备用电脑当前在线时显示
                        let backupBtn = '';
                        const wd = o.watchdog;
                        if (validId && wd && wd.bound && wd.online) {
                            backupBtn = ` <button class="btn-sm btn-amber" onclick="restartBackupPC(${oid})">重启备用电脑</button>`;
                        }
                        actionHtml = `${stopBtn}${switchBtn}${rejoinBtn}${spectateBtn}${backupBtn}`;
                    }

                    html += `<tr>
                        <td>${escHtml(o.id)}</td>
                        <td>${escHtml(o.device_name || '--')}</td>
                        <td>${escHtml(o.boss_name || '')}</td>
                        <td>${escHtml(modeLabel)}</td>
                        <td>${escHtml(formatMinutes(o.run_minutes))} / ${escHtml(o.run_rounds || 0)}战损</td>
                        <td>${o.status === 'completed' ? `${escHtml(formatMinutes(o.actual_minutes))} / ${escHtml(Math.max(0, Math.min(o.run_rounds || 0, (o.round_count || 0) - Math.max(0, (o.max_rounds || 0) - (o.run_rounds || 0)))))}战损` : '--'}</td>
                        <td>${o.status === 'completed' ? `${escHtml(formatMinutes(o.refund_minutes))} / ${escHtml(o.refund_rounds || 0)}战损` : '--'}</td>
                        <td>${statusHtml}</td>
                        <td>${escHtml(formatDateTime(o.created_at))}</td>
                        <td class="order-action-cell">${actionHtml}</td>
                    </tr>`;

                    // 手机端：把操作按钮另起一行（全宽），避免横向滚动到最右才能点。
                    // 桌面端 CSS 把这行隐藏；手机端把上面那一格的 inline 操作隐藏。
                    if (actionHtml) {
                        html += `<tr class="order-action-row">
                            <td colspan="10" class="order-action-row-cell">${actionHtml}</td>
                        </tr>`;
                    }

                    const enhancedUrl = safeHttpUrl(o.enhanced_radar_url);
                    const nativeUrl = safeHttpUrl(o.native_radar_url);
                    if (o.status === 'running' && (enhancedUrl || nativeUrl)) {
                        html += `<tr>
                            <td colspan="10" style="background:#eff6ff;padding:8px 14px;border-bottom:1px solid #dbeafe;">`;

                        if (enhancedUrl) {
                            const enhancedText = escHtml(enhancedUrl);
                            const enhancedEncoded = encodeURIComponent(enhancedUrl);
                            html += `<div style="margin-bottom:${nativeUrl ? '6px' : '0'};">
                                <span style="font-size:12px;color:#1d4ed8;">增强版备注网址：</span>
                                <a href="${enhancedText}" target="_blank" rel="noopener noreferrer" style="font-size:12px;color:#3b82f6;word-break:break-all;">${enhancedText}</a>
                                <button class="btn-sm btn-primary" style="margin-left:8px;padding:2px 10px;font-size:11px;" onclick="copyRadarUrl(decodeURIComponent('${enhancedEncoded}'))">复制</button>
                            </div>`;
                        }

                        if (nativeUrl) {
                            const nativeText = escHtml(nativeUrl);
                            const nativeEncoded = encodeURIComponent(nativeUrl);
                            html += `<div>
                                <span style="font-size:12px;color:#1d4ed8;">原生备注网址：</span>
                                <a href="${nativeText}" target="_blank" rel="noopener noreferrer" style="font-size:12px;color:#3b82f6;word-break:break-all;">${nativeText}</a>
                                <button class="btn-sm btn-primary" style="margin-left:8px;padding:2px 10px;font-size:11px;" onclick="copyRadarUrl(decodeURIComponent('${nativeEncoded}'))">复制</button>
                            </div>`;
                        }

                        html += `</td>
                        </tr>`;
                    }
                });

                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        function copyRadarUrl(url) {
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(url).then(function () {
                        appAlert('备注网址已复制');
                    }).catch(function () {
                        fallbackCopy(url);
                    });
                } else {
                    fallbackCopy(url);
                }
            } catch (e) {
                fallbackCopy(url);
            }
        }

        function fallbackCopy(text) {
            var ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            ta.style.top = '-9999px';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            try {
                document.execCommand('copy');
                appAlert('备注网址已复制');
            } catch (e) {
                const safeText = (text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                appAlert({
                    title: '请手动复制',
                    html: `<div style="margin-bottom:8px;color:#6b7280;">自动复制失败，请选中下方内容手动复制：</div>
                           <textarea readonly onclick="this.select()" style="width:100%;height:80px;padding:8px;border:1px solid #d1d5db;border-radius:6px;font-family:monospace;font-size:13px;box-sizing:border-box;">${safeText}</textarea>`
                });
            }
            document.body.removeChild(ta);
        }

        async function loadRechargeConfigs() {
            // 当前业务只允许商户预先创建卡密，客户输入卡密兑换；
            // 不再从支付套餐接口拉取套餐，也不创建支付二维码订单。
            _rechargeConfigs = [];
            const box = document.getElementById('rechargeCardsContainer');
            if (box) box.innerHTML = '';
        }

        function renderRechargeCards() {
            const container = document.getElementById('rechargeCardsContainer');
            let filtered;
            if (_rechargeMode === 'night') {
                filtered = _rechargeConfigs.filter(c => c.config_type === 'card');
            } else {
                filtered = _rechargeConfigs.filter(c => c.config_type !== 'card' && c.mode === _rechargeMode);
            }
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无可用套餐</div>';
                return;
            }
            container.innerHTML = filtered.map(c => {
                const isCard = c.config_type === 'card';
                const bonusHtml = !isCard && c.bonus_minutes > 0
                    ? `<div style="background:#fef3c7;color:#d97706;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;margin-top:8px;">充${c.minutes}分钟 送${c.bonus_minutes}分钟</div>`
                    : '';
                let lossHtml = '';
                if (isCard) {
                    const coin = parseInt(c.night_coin_loss) || 0;
                    const rounds = parseInt(c.night_rounds) || 0;
                    if (coin > 0) lossHtml = `<div style="background:#ede9fe;color:#6d28d9;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;margin-top:8px;">限币 ${coin}万</div>`;
                    else if (rounds > 0) lossHtml = `<div style="background:#ede9fe;color:#6d28d9;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;margin-top:8px;">限局 ${rounds}局</div>`;
                }
                const totalMin = c.minutes + (isCard ? 0 : c.bonus_minutes);
                const h = Math.floor(totalMin / 60), m = totalMin % 60;
                const totalText = h > 0 ? `${h}小时${m > 0 ? m + '分钟' : ''}` : `${m}分钟`;
                const modeText = c.mode === 'machine' ? '机密' : '绝密';
                const descText = isCard ? `${modeText}包夜卡 · ${totalText}` : `时长 ${totalText}`;
                const btnText = isCard ? '立即购买' : '立即充值';
                const borderColor = isCard ? '#7c3aed' : '#3b82f6';
                const priceColor = isCard ? '#7c3aed' : '#3b82f6';
                return `<div style="background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);text-align:center;cursor:pointer;border:2px solid transparent;transition:all .2s;" onmouseover="this.style.borderColor='${borderColor}'" onmouseout="this.style.borderColor='transparent'">
                    <div style="font-size:16px;font-weight:700;color:#1f2937;margin-bottom:4px;">${c.name}</div>
                    <div style="font-size:28px;font-weight:800;color:${priceColor};margin:10px 0;">¥${c.price}</div>
                    <div style="font-size:13px;color:#6b7280;">${descText}</div>
                    ${bonusHtml}
                    ${lossHtml}
                    <button class="btn-sm btn-primary" style="margin-top:14px;padding:8px 30px;font-size:14px;${isCard ? 'background:#7c3aed;' : ''}" onclick="createRechargeOrder(${c.id})">${btnText}</button>
                </div>`;
            }).join('');
        }

        }

        async function repayOrder(orderId) {
            return appAlert('当前系统已改为卡密充值，请输入商户发放的充值卡密兑换时长');
        }

        async function loadRechargeOrders() {
            const container = document.getElementById('rechargeOrdersContainer');
            try {
                const res = await fetch('/api/recharge/orders');
                const data = await res.json();
                const records = (data.ok ? (data.orders || []) : [])
                    .filter(o => o.config_type === 'card_redeem' || (o.card_code && o.status === 'paid'));
                if (records.length === 0) {
                    container.innerHTML = '<div class="empty-state">暂无卡密激活记录</div>';
                    return;
                }
                const escape = (s) => String(s || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
                let html = '<div class="card-activation-grid">';
                records.forEach((o, idx) => {
                    const modeText = o.mode === 'absolute' ? '绝密' : '机密';
                    const modeClass = o.mode === 'absolute' ? 'absolute' : 'machine';
                    const rounds = parseInt(o.rounds || o.value_rounds || o.absolute_rounds || 0) || 0;
                    const roundsText = rounds > 0 ? `${rounds}战损` : '不限战损';
                    const cardCode = o.card_code || '--';
                    const minutes = parseInt(o.minutes || 0) || 0;
                    const delay = Math.min(idx, 8) * 0.04;
                    html += `<div class="card-activation-bubble ${modeClass}" style="animation-delay:${delay}s">
                        <div class="card-activation-top">
                            <span class="card-activation-badge">✦ 卡密激活</span>
                            <span class="card-activation-status">已激活</span>
                        </div>
                        <div class="card-activation-main">
                            <span class="card-activation-mode">${modeText}</span>
                            <span class="card-activation-minutes">${minutes}分钟</span>
                            <span class="card-activation-rounds">${roundsText}</span>
                        </div>
                        <div class="card-activation-code">卡密 ${escape(cardCode)}</div>
                        <div class="card-activation-foot">⏱ ${escape(o.created_at || '--')}</div>
                    </div>`;
                });
                html += '</div>';
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        // ===== 退出 =====
        async function doLogout() {
            const res = await fetch('/api/logout', { method: 'POST' });
            const data = await res.json();
            window.location.href = data.redirect || _loginUrl();
        }

        // ===== 倒计时实时更新 =====
        function updateCountdowns() {
            document.querySelectorAll('.device-countdown[data-end]').forEach(el => {
                const end = parseInt(el.dataset.end);
                const type = el.dataset.type;
                const remain = end - Date.now();
                if (remain <= 0) {
                    el.textContent = '⏱ 即将可用';
                    el.style.color = '#16a34a';
                    return;
                }
                const hh = Math.floor(remain / 3600000);
                const mm = Math.floor((remain % 3600000) / 60000);
                const ss = Math.floor((remain % 60000) / 1000);
                const suffix = type === 'running' ? ' 后结束' : ' 后可用';
                if (hh > 0) {
                    el.textContent = `⏱ ${hh}时${mm}分${ss}秒${suffix}`;
                } else if (mm > 0) {
                    el.textContent = `⏱ ${mm}分${ss}秒${suffix}`;
                } else {
                    el.textContent = `⏱ ${ss}秒${suffix}`;
                }
            });
        }
        setInterval(updateCountdowns, 1000);

        // ===== 初始化 =====
        loadBalance();
        loadDevices();

        const paymentSuccessMessage = getPaymentSuccessMessage();
        const initialTab = new URLSearchParams(window.location.search).get('tab');
        if (initialTab) {
            switchTab(initialTab);
        }

        if (paymentSuccessMessage) {
            showPaymentSuccessModal(paymentSuccessMessage);
        }

        // 加载公告
        fetch('/api/notice').then(r => r.json()).then(d => {
            if (d.ok && d.content && d.content.trim()) {
                const bar = document.getElementById('noticeBar');
                bar.innerHTML = d.content;
                bar.style.display = 'block';
            }
        }).catch(() => { });

        // 每10秒自动刷新设备状态
        setInterval(() => {
            loadDevices();
            loadBalance();
        }, 10000);
    </script>
</body>

</html>
